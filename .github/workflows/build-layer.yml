name: Build Lambda Layer
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'requirements.txt'

jobs:
  build-lambda-layer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build layer in Lambda-compatible environment
        run: |
          cat > Dockerfile <<'EOF'
          FROM public.ecr.aws/lambda/python:3.12   
          
          COPY requirements.txt .
          
          RUN mkdir -p /asset/python && \
              pip install --upgrade pip && \
              pip install -r requirements.txt \
                -t /asset/python/ \
                --no-cache-dir \
                --only-binary=:all:
          
          RUN cd /asset/python && \
              find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true && \
              find . -type f -name "*.pyc" -delete && \
              find . -type f -name "*.pyo" -delete && \
              find . -type d -name "tests" -exec rm -rf {} + 2>/dev/null || true && \
              find . -type d -name "test" -exec rm -rf {} + 2>/dev/null || true
          
          WORKDIR /asset
          EOF

          docker build -t lambda-layer-builder .

          docker create --name temp-container lambda-layer-builder
          docker cp temp-container:/asset ./layer
          docker rm temp-container

      - name: Verify pydantic_core binary is correct
        run: |
          echo "📦 Layer contents:"
          ls -lh layer/python/ | head -30
          echo ""
          echo "🔍 Verifying pydantic_core binary (must contain cpython-312):"
          find layer/python/pydantic_core/ -name "*.so" | head -5
          echo ""
          echo "📊 Layer size before zipping:"
          du -sh layer/python/

      - name: Create ZIP file
        run: |
          cd layer
          zip -r ../strands-lambda-layer.zip python/
          cd ..
          echo "📏 Layer size:"
          ls -lh strands-lambda-layer.zip

      - name: Upload layer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: strands-lambda-layer
          path: strands-lambda-layer.zip
          retention-days: 7

      - name: Display success message
        run: |
          echo "✅ Lambda layer built in Python 3.12 Lambda container!"
